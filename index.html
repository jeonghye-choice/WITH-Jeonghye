<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WITH Jeonghye 📅</title>
  <meta name="description" content="Jeonghye와 약속을 잡아보세요. 가능한 날짜를 선택하고 원하는 약속 유형을 골라드려요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="7" fill="white"/>
            <rect width="28" height="9" rx="7" fill="url(#calGrad)"/>
            <rect y="5" width="28" height="4" fill="url(#calGrad)"/>
            <text x="14" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="800" fill="#1C1C1E">26</text>
            <circle cx="9" cy="5" r="1.5" fill="rgba(255,255,255,0.7)"/>
            <circle cx="19" cy="5" r="1.5" fill="rgba(255,255,255,0.7)"/>
            <defs>
              <linearGradient id="calGrad" x1="0" y1="0" x2="28" y2="0" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#FF3B30"/>
                <stop offset="100%" stop-color="#FF6B30"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">약속 정혜</span>
      </div>
      <button class="admin-btn" id="adminToggleBtn">관리자</button>
    </div>
  </header>

  <!-- Main App -->
  <main class="main" id="mainView">
    <section class="hero">
      <h1 class="hero-title">언제 만날까요? <span class="hero-emoji">🤗</span></h1>
      <p class="hero-sub">나랑 놀자 🥳</p>
    </section>

    <!-- Calendar -->
    <div class="calendar-card">
      <div class="cal-nav">
        <button class="nav-btn" id="prevMonthBtn">‹</button>
        <span class="cal-month-label" id="monthLabel"></span>
        <button class="nav-btn" id="nextMonthBtn">›</button>
      </div>
      <div class="cal-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>

      <div class="cal-legend">
        <div class="legend-item"><span class="dot dot-busy"></span> 바쁜 날</div>
        <div class="legend-item"><span class="dot dot-booked"></span> 예약됨</div>
      </div>
    </div>
  </main>

  <!-- Booking Modal -->
  <div class="modal-overlay hidden" id="bookingOverlay">
    <div class="modal" id="bookingModal">
      <button class="modal-close" id="modalCloseBtn">✕</button>

      <div class="modal-date-badge" id="modalDateBadge">
        <div class="badge-day" id="badgeDay">화</div>
        <div class="badge-num" id="badgeNum">12</div>
      </div>

      <h2 class="modal-title">어떤 약속을 잡을까요?</h2>

      <!-- Meetup Type -->
      <div class="section-label">약속 종류</div>
      <div class="type-grid" id="typeGrid">
        <button class="type-card" data-type="술약속" data-emoji="🍺">
          <div class="type-icon-glass" style="--g1:#FF6B9D;--g2:#FF9A3C;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 3h11l1 5H5V3z"/><path d="M5 8v13h11V8"/><path d="M16 8h3a2 2 0 010 4h-3"/>
            </svg>
          </div>
          <span class="type-name">술약속</span>
        </button>
        <button class="type-card" data-type="데이트" data-emoji="💕">
          <div class="type-icon-glass" style="--g1:#FF6B9D;--g2:#FF8EE0;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white" stroke="none">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </div>
          <span class="type-name">데이트</span>
        </button>
        <button class="type-card" data-type="밥 약속" data-emoji="🍚">
          <div class="type-icon-glass" style="--g1:#FF9A3C;--g2:#FFD93D;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a8 8 0 018 8H4a8 8 0 018-8z"/><rect x="3" y="10" width="18" height="2" rx="1"/><path d="M5 12v3a7 7 0 0014 0v-3"/>
            </svg>
          </div>
          <span class="type-name">밥 약속</span>
        </button>
        <button class="type-card" data-type="카페" data-emoji="☕">
          <div class="type-icon-glass" style="--g1:#A78BFA;--g2:#60A5FA;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 8h1a4 4 0 010 8h-1"/><path d="M3 8h14v9a4 4 0 01-4 4H7a4 4 0 01-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/>
            </svg>
          </div>
          <span class="type-name">카페 수다</span>
        </button>
        <button class="type-card" data-type="기타" data-emoji="✏️">
          <div class="type-icon-glass" style="--g1:#34D399;--g2:#60A5FA;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </div>
          <span class="type-name">기타</span>
        </button>
      </div>
      <div class="custom-type-wrap hidden" id="customTypeWrap">
        <input class="text-input" id="customTypeInput" type="text" placeholder="약속 종류를 직접 입력하세요" maxlength="20" />
      </div>

      <!-- Time Picker -->
      <div class="section-label">시간 선택</div>
      <div class="time-grid" id="timeGrid"></div>

      <!-- Name -->
      <div class="section-label">이름</div>
      <input class="text-input" id="nameInput" type="text" placeholder="이름을 입력하세요" maxlength="20" />

      <!-- Email -->
      <div class="section-label">이메일 <span class="optional">(수락/거절 알림 받기)</span></div>
      <input class="text-input" id="emailInput" type="email" placeholder="example@email.com" />

      <!-- Note -->
      <div class="section-label">한마디 <span class="optional">(선택)</span></div>
      <textarea class="text-input textarea" id="noteInput" placeholder="하고 싶은 말을 적어주세요..." rows="2" maxlength="100"></textarea>

      <button class="submit-btn" id="submitBookingBtn">약속 신청하기 🎉</button>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay hidden" id="successOverlay">
    <div class="modal success-modal">
      <div class="success-icon">🎉</div>
      <h2 class="modal-title">약속 신청 완료!</h2>
      <p class="success-desc" id="successDesc"></p>
      <div class="success-detail" id="successDetail"></div>
      <button class="submit-btn" id="successCloseBtn">확인</button>
    </div>
  </div>

  <!-- Success Toast -->
  <div class="toast hidden" id="toast">
    <span class="toast-icon">✅</span>
    <span id="toastMsg">약속이 신청되었어요!</span>
  </div>

  <!-- Admin Panel -->
  <div class="modal-overlay hidden" id="adminOverlay">
    <div class="modal admin-modal">
      <button class="modal-close" id="adminCloseBtn">✕</button>
      <h2 class="modal-title">🔒 관리자 패널</h2>

      <!-- Password Gate -->
      <div id="adminGate">
        <p class="admin-desc">관리자 비밀번호를 입력하세요</p>
        <input class="text-input" id="adminPwInput" type="password" placeholder="비밀번호" />
        <button class="submit-btn" id="adminLoginBtn">입장하기</button>
        <p class="admin-error hidden" id="adminError">비밀번호가 틀렸어요 🥲</p>
      </div>

      <!-- Admin Content -->
      <div id="adminContent" class="hidden">

        <!-- Change Password -->
        <div class="admin-section">
          <div class="section-label">바쁜 날 추가 (단일)</div>
          <div class="busy-add-row">
            <input class="text-input flex1" id="busyDateInput" type="date" />
            <input class="text-input flex1" id="busyLabelInput" type="text" placeholder="메모 (선택)" maxlength="30" />
            <button class="add-btn" id="addBusyBtn">추가</button>
          </div>
          <div class="section-label" style="margin-top:14px;">바쁜 날 추가 (범위)</div>
          <div class="busy-add-row">
            <input class="text-input flex1" id="busyRangeStart" type="date" />
            <span style="color:var(--text-muted);font-size:13px;white-space:nowrap;">~</span>
            <input class="text-input flex1" id="busyRangeEnd" type="date" />
            <input class="text-input flex1" id="busyRangeLabel" type="text" placeholder="메모 (선택)" maxlength="30" />
            <button class="add-btn" id="addBusyRangeBtn">추가</button>
          </div>
          <div class="busy-list" id="busyList"></div>
        </div>

        <!-- Bookings -->
        <div class="admin-section">
          <div class="section-label">대기 중인 예약</div>
          <div class="booking-list" id="adminBookingList"></div>
        </div>

        <!-- Confirmed -->
        <div class="admin-section">
          <div class="section-label">확정된 일정</div>
          <div class="booking-list" id="adminConfirmedList"></div>
        </div>

        <!-- PW Change -->
        <div class="admin-section">
          <div class="section-label">비밀번호 변경</div>
          <div class="busy-add-row">
            <input class="text-input flex1" id="newPwInput" type="password" placeholder="새 비밀번호" />
            <button class="add-btn" id="changePwBtn">변경</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
